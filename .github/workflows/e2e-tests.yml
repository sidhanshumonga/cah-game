name: End-to-End Tests

on:
  push:
    branches: [ main, e2e-testing ]
  pull_request:
    branches: [ main, e2e-testing ]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests with Firebase Emulators
        run: |
          npx -y firebase-tools emulators:exec --only auth,firestore "node e2e/seed-packs.mjs && npx playwright test"
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "test-cah"
          NEXT_PUBLIC_FIREBASE_EMULATOR: "true"
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
          FIREBASE_AUTH_EMULATOR_HOST: "127.0.0.1:9099"

      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
